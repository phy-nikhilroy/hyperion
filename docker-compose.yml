version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  server:
    build: ./server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    ports:
      - "5000:5000"

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "3000:80"

volumes:
  redis_data:
